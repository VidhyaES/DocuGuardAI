<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuGuard AI — ID Forgery Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="container">

  <header>
    <div class="header-inner">
      <div class="logo-mark">🛡</div>
      <div>
        <h1>Docu<span>Guard</span> AI</h1>
        <div class="subtitle">ID Document Forgery Detection System</div>
      </div>
      <div class="version-badge">v1.0.0 · FastAPI</div>
    </div>
  </header>

  <label class="upload-zone" id="uploadZone" for="fileInput">
    <span class="upload-icon">📄</span>
    <div class="upload-title">Drop your ID document here</div>
    <div class="upload-desc">Passport · Driver's License · National ID · Any government-issued document</div>
    <span class="upload-btn">Select Document</span>
    <div class="accepted-types">Accepted: JPG · PNG · WEBP · BMP · GIF · Max 15 MB</div>
  </label>
  <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,image/webp,image/bmp,image/gif" style="display:none" />

  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <span>📎</span>&nbsp;Document Preview —&nbsp;<span id="fileName">—</span>
    </div>
    <div class="preview-body">
      <div class="preview-img-wrap">
        <img id="previewImg" src="" alt="Document preview" />
      </div>
      <div class="preview-meta" id="previewMeta"></div>
    </div>
  </div>

  <div class="analyze-wrap" id="analyzeWrap">
    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
      <span>⟩ RUN FORENSIC ANALYSIS</span>
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="loading-section" id="loadingSection">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">INITIALIZING ANALYSIS...</div>
    <div class="loading-steps" id="loadingSteps"></div>
  </div>

  <div class="report-section" id="reportSection"></div>

  <div class="disclaimer">
    ⚠️ DocuGuard AI is a prototype forensic tool. Results are indicative only and should not be the sole basis for legal or security decisions.
  </div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
